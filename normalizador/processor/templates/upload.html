<h1>Subir archivo</h1>

{% if error %}
    <p style="color:rgb(223, 3, 3)">{{ error }}</p>
    {% endif %}

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <input type="file" name="archivo">

    <button type="submit">Subir</button>
</form>
{% if tabla %}
    <h2>Vista previa</h2>
    {{ tabla|safe }}
    <br><br>
{% endif %}

<a href="{% url 'descargar' %}">
    <button type="button">
        Descargar archivo limpio
    </button>
</a>
